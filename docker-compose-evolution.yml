version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:v1.6.0
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      # API Configuration
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE
      - CORS_CREDENTIALS=true

      # Database (usando arquivo local para simplicidade)
      - DATABASE_ENABLED=false

      # Cache
      - CACHE_REDIS_ENABLED=false

      # Auth
      - AUTHENTICATION_API_KEY=B6D711FCDE4D4FD5936544120E713976
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true

      # Webhook base URL (ContatoSync)
      - WEBHOOK_BASE_URL=http://localhost:3000/api/webhooks
      - WEBHOOK_EVENTS_APPLICATION_STARTUP=false
      - WEBHOOK_EVENTS_INSTANCE_CREATE=true
      - WEBHOOK_EVENTS_INSTANCE_DELETE=true
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_SET=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_SEND_MESSAGE=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true

      # Logs
      - LOG_LEVEL=ERROR
      - LOG_COLOR=false

    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped

volumes:
  evolution_data: